<svg xmlns="http://www.w3.org/2000/svg" width="760" height="210" viewBox="0 0 760 210" role="img" aria-labelledby="title desc">
  <title id="title">archdown</title>
  <desc id="desc">An arched terminal prompt flowing into a downward arrow beside the words Arch power, friendly words.</desc>
  <defs>
    <linearGradient id="brand" x1="42" y1="42" x2="175" y2="172" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#1793D1"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.22"/>
    </filter>
    <style>
      .wordmark { fill: #0F172A; }
      .tagline { fill: #475569; }
      @media (prefers-color-scheme: dark) {
        .wordmark { fill: #F8FAFC; }
        .tagline { fill: #CBD5E1; }
      }
