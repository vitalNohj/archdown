    <path d="M67 103L84 118L67 133" fill="none" stroke="#F8FAFC" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M91 134H119" fill="none" stroke="#F8FAFC" stroke-width="9" stroke-linecap="round"/>
  </g>

  <text class="wordmark" x="225" y="112"
