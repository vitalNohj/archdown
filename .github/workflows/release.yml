name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build --sdist --wheel

      - name: Smoke test wheel
        shell: bash
        run: |
          python -m venv /tmp/archdown-release-smoke
          wheel=$(ls dist/archdown-*.whl | head -n 1)
          /tmp/archdown-release-smoke/bin/python -m pip install "$wheel"
          /tmp/archdown-release-smoke/bin/archdown --version
          /tmp/archdown-release-smoke/bin/ad --version

      - name: Publish GitHub release
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag --title "archdown $GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}
