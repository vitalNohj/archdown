name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Test
        run: python -m pytest -q

      - name: Build package
        run: python -m build --sdist --wheel

      - name: Install wheel smoke test
        shell: bash
        run: |
          python -m venv /tmp/archdown-wheel-smoke
          wheel=$(ls dist/archdown-*.whl | head -n 1)
          /tmp/archdown-wheel-smoke/bin/python -m pip install "$wheel"
          /tmp/archdown-wheel-smoke/bin/archdown --help
